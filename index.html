<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Smart Finance Dashboard</title>

    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <header>
      <h1>💰 Smart Profit & Loss Dashboard</h1>
    </header>

    <div class="dashboard">
      <div class="card income">
        <h2>Total Income</h2>
        <p id="totalIncome">0</p>
      </div>

      <div class="card expense">
        <h2>Total Expense</h2>
        <p id="totalExpense">0</p>
      </div>

      <div class="card profit">
        <h2>Profit / Loss</h2>
        <p id="profitLoss">0</p>
      </div>
    </div>

    <div class="container">
      <div class="form-section">
        <h2>Add Income</h2>

        <input type="text" id="incomeName" placeholder="Income Source" />
        <input type="number" id="incomeAmount" placeholder="Amount" />

        <button onclick="addIncome()">Add Income</button>
      </div>

      <div class="form-section">
        <h2>Add Expense</h2>

        <input type="text" id="expenseName" placeholder="Expense Name" />
        <input type="number" id="expenseAmount" placeholder="Amount" />

        <button onclick="addExpense()">Add Expense</button>
      </div>
    </div>

    <div class="tables">
      <div class="table-box">
        <h2>Income List</h2>

        <table>
          <thead>
            <tr>
              <th>Source</th>
              <th>Amount</th>
            </tr>
          </thead>

          <tbody id="incomeTable"></tbody>
        </table>
      </div>

      <div class="table-box">
        <h2>Expense List</h2>

        <table>
          <thead>
            <tr>
              <th>Expense</th>
              <th>Amount</th>
            </tr>
          </thead>

          <tbody id="expenseTable"></tbody>
        </table>
      </div>
    </div>

    <div class="chart-container">
      <canvas id="financeChart"></canvas>
    </div>

    <script src="script.js"></script>
  </body>
</html>
